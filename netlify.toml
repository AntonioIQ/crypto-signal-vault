[build]
  command = "npm run build"
  publish = "public"
  # A production deploy costs 15 of the 300 monthly credits (docs/06_PRESUPUESTO.md),
  # so docs-only pushes must not build. Exit 0 cancels the build: that happens when
  # the diff touches nothing outside docs/ and *.md.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)docs/' ':(exclude)*.md'"

[functions]
  directory = "netlify/functions"

# Every 15 minutes keeps the "EN VIVO" label on the price card honest. Cost is
# ~2,880 of CoinGecko's 10,000 monthly credits and ~16 of Netlify's 300 (compute
# is billed per GB-hour; only deploys are expensive). Runs around the clock on
# purpose: this is a portfolio site with visitors in any timezone, and crypto
# trades 24/7 — a quiet overnight window would show an 8h-old price.
[functions."predict"]
  schedule = "*/15 * * * *"

# Every 6 hours is enough: the chart needs a 30-day window and the 24h change
# only breaks once history is >26h stale, so a failed run still has 3 retries
# before anything degrades.
[functions."refresh-history"]
  schedule = "0 */6 * * *"

[[redirects]]
  from = "/api/latest"
  to = "/.netlify/functions/latest"
  status = 200
  force = true

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/history"
  status = 200
  force = true

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true
