name: Daily forecast training

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-forecast-training-${{ github.repository }}
  cancel-in-progress: false

jobs:
  train-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Download public market histories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/history"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "https://likelycoin.netlify.app/api/history?asset=btc" \
            --output "${RUNNER_TEMP}/history/btc.json"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "https://likelycoin.netlify.app/api/history?asset=eth" \
            --output "${RUNNER_TEMP}/history/eth.json"

      - name: Install Python dependencies
        run: python -m pip install --requirement ml/requirements.txt

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Train canonical forecast artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/forecast"
          python ml/train.py \
            --history-dir "${RUNNER_TEMP}/history" \
            --output "${RUNNER_TEMP}/forecast/latest.json" \
            --generated-at "$(date --iso-8601=seconds)" \
            --code-revision "${GITHUB_SHA}" \
            --validation-origins 40

      - name: Run Node.js tests
        run: npm test

      - name: Publish forecast artifact to Netlify Blobs
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: node scripts/publish-forecast.mjs "${RUNNER_TEMP}/forecast/latest.json"
