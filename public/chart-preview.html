<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>LikelyCoin — vista previa de gráfica</title>
  <style>
    :root { --lk-accent:#4fe0b8; --lk-fc:#b39dff; --lk-up:#4fe0b8; --lk-down:#ff7a9c;
      --lk-bg:#0a1420; --lk-panel:#10202e; --lk-grid:rgba(180,220,230,.08); --lk-border:rgba(199,232,219,.14);
      --lk-text:#f1f7f4; --lk-muted:#93a6b4; color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin:0; background:var(--lk-bg); color:var(--lk-text); display:grid; place-items:center; min-height:100vh; padding:24px; }
    .wrap { max-width:780px; width:100%; }
    .head { text-align:center; margin-bottom:18px; }
    .head p { color:var(--lk-muted); font-size:13px; margin:6px 0 0; }
    .badge { display:inline-block; font:700 10px Inter,sans-serif; letter-spacing:.14em; color:var(--lk-accent); }
    .lk { background:var(--lk-panel); border:1px solid var(--lk-border); border-radius:18px; padding:20px; }
    .lk-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .lk-tabs, .lk-modes { display:inline-flex; gap:4px; padding:4px; border:1px solid var(--lk-border); border-radius:11px; background:rgba(0,0,0,.22); }
    .lk-tab, .lk-mode { border:0; background:transparent; color:var(--lk-muted); font:600 13px Inter,sans-serif; padding:6px 15px; border-radius:8px; cursor:pointer; transition:.16s; }
    .lk-tab.active { background:var(--lk-accent); color:#08150f; }
    .lk-mode.active { background:var(--lk-fc); color:#160f2e; }
    .lk-price { margin:15px 0 2px; font:600 34px/1 Inter,sans-serif; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
    .lk-chg { font:700 14px Inter,sans-serif; margin-left:10px; }
    .lk-chg.up { color:var(--lk-up); } .lk-chg.down { color:var(--lk-down); }
    .lk-legend { display:flex; gap:8px; margin:12px 0 2px; }
    .lk-chip { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--lk-border); background:rgba(0,0,0,.18); color:var(--lk-muted); font:600 12px Inter,sans-serif; padding:6px 11px; border-radius:999px; cursor:pointer; transition:.16s; }
    .lk-chip.on { color:var(--lk-text); } .lk-chip:not(.on) { opacity:.4; }
    .sw { width:16px; height:11px; display:inline-flex; align-items:center; } .sw-fc { border-top:2.5px dashed var(--lk-fc); }
    .lk-cw { position:relative; margin-top:8px; }
    .lk-svg { width:100%; height:330px; display:block; overflow:visible; }
    .lk-grid { stroke:var(--lk-grid); stroke-width:1; }
    .lk-real { fill:none; stroke:var(--lk-accent); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round; }
    .lk-area { opacity:.10; }
    .lk-fc { fill:none; stroke:var(--lk-fc); stroke-width:2.2; stroke-dasharray:6 6; stroke-linecap:round; transition:opacity .35s; }
    .lk-wick { stroke-width:1.3; }
    .lk-body { transition:transform .5s cubic-bezier(.4,0,.2,1); transform-box:fill-box; transform-origin:center; }
    .lk-cross { stroke:var(--lk-muted); stroke-width:1; stroke-dasharray:3 3; opacity:0; }
    .lk-dot { stroke:var(--lk-bg); stroke-width:2; opacity:0; }
    .lk-tip { position:absolute; pointer-events:none; background:var(--lk-panel); border:1px solid var(--lk-border); border-radius:9px; padding:8px 11px; font:600 12px Inter,sans-serif; color:var(--lk-text); white-space:nowrap; transform:translate(-50%,-120%); box-shadow:0 10px 26px rgba(0,0,0,.45); }
    .lk-tip .d { color:var(--lk-muted); font-weight:500; font-size:11px; display:block; margin-top:2px; } .lk-tip .fc { color:var(--lk-fc); }
    .lk-tip b.up { color:var(--lk-up); } .lk-tip b.down { color:var(--lk-down); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <span class="badge">VISTA PREVIA · PALETA AURORA</span>
      <p>Gráfica nueva con datos reales de producción · no está en el sitio en vivo todavía</p>
    </div>
    <div id="chart"></div>
  </div>
  <script type="module">
    import { initLikelyChart } from './js/likely-chart.js';
    // Live API first (real data on the deploy), static seed as fallback.
    const load = async (live, seed) => {
      try { const r = await fetch(live); if (r.ok) return await r.json(); } catch { /* fall through */ }
      return (await fetch(seed)).json();
    };
    Promise.all([
      load('/api/latest', 'data/latest.json'),
      load('/api/history?asset=btc', 'data/history/btc.json'),
      load('/api/history?asset=eth', 'data/history/eth.json'),
    ]).then(([snapshot, btc, eth]) => {
      initLikelyChart(document.getElementById('chart'), { snapshot, histories: { btc, eth } });
    });
  </script>
</body>
</html>
